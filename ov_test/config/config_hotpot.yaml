project_name: "RAG_Benchmark"

# ===========修改配置================
dataset_name: "HotpotQA" 

adapter:
  module: "src.adapters.hotpotqa_adapter"  
  class_name: "HotpotQAAdapter"     

execution:
  max_workers: 12         # LLM 生成任务的并发数
  ingest_workers: 12      # 数据入库任务的并发数，提交到ov的并发数
  retrieval_topk: 5
  max_queries: null        # 最大查询数，null表示全部查询
# ==================================  

paths:
  raw_data: "Data/{dataset_name}/hotpot_qa_100.json"
  doc_output_dir: "Data/{dataset_name}/openviking/processed_docs"
  vector_store: "Data/{dataset_name}/openviking/store_index"
  output_dir: "Output/{dataset_name}/openviking_global/experiment_0001"
  log_file: "Output/{dataset_name}/openviking_global/experiment_0001/benchmark.log"


llm:
  model: "${LLM_MODEL}"
  temperature: 0
  base_url: "${LLM_BASE_URL}"
  api_key: "${LLM_API_KEY}"