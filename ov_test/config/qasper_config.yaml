project_name: "RAG_Benchmark"

# ===========修改配置================
dataset_name: "Qasper" 

adapter:
  module: "src.adapters.qasper_adapter"  
  class_name: "QasperAdapter"     

execution:
  max_workers: 5
  ingest_workers: 5
  retrieval_topk: 5
  max_queries: null
  skip_ingestion: true
# ==================================  

paths:
