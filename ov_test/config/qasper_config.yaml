  vector_store: "Data/{dataset_name}/viking_store_index"
  output_dir: "Output/{dataset_name}/experiment_v21"
  log_file: "Output/{dataset_name}/experiment_v21/benchmark.log"


llm:
  model: "doubao-seed-1-8-251228"
  temperature: 0
