project_name: "RAG_Benchmark"

dataset_name: "Qasper"

adapter:
  module: "src.adapters.qasper_adapter"
  class_name: "QasperAdapter"

store:
  type: "lightrag"
  lightrag_config:
    llm_model: "${LLM_MODEL}"
    llm_base_url: "${LLM_BASE_URL}"
    llm_api_key_env: "LLM_API_KEY"
    embedding_model_name: "${EMBEDDING_MODEL_NAME}"
    embedding_base_url: "${EMBEDDING_BASE_URL}"
    embedding_api_key: "${EMBEDDING_API_KEY}"
    enable_rerank: true
    rerank_ak_env: "RERANK_AK"
    rerank_sk_env: "RERANK_SK"
    rerank_host: "api-vikingdb.vikingdb.cn-beijing.volces.com"
    rerank_model_name: "doubao-seed-rerank"
    rerank_model_version: "251028"
    rerank_threshold: 0.1
    use_native_answer_generation: false

execution:
  max_workers: 10
  ingest_group_workers: 10
  max_queries: null

paths:
  raw_data: "Data/{dataset_name}/qasper-dev-v0.3.json"
  doc_output_dir: "Data/{dataset_name}/lightrag_per_question/processed_docs"
  vector_store: "Data/{dataset_name}/lightrag_per_question/store_index"
  output_dir: "Output/{dataset_name}/lightrag_per_question/experiment_0001"
  log_file: "Output/{dataset_name}/lightrag_per_question/experiment_0001/benchmark.log"

llm:
  model: "${LLM_MODEL}"
  temperature: 0
  base_url: "${LLM_BASE_URL}"
  api_key: "${LLM_API_KEY}"
