project_name: "RAG_Benchmark"

dataset_name: "ClapNQ"

adapter:
  module: "src.adapters.clapnq_adapter"
  class_name: "ClapNQAdapter"

store:
  type: "lightrag"
  lightrag_config:
    llm_model: "${LLM_MODEL}"
    llm_base_url: "${LLM_BASE_URL}"
    llm_api_key_env: "LLM_API_KEY"
    embedding_model_name: "${EMBEDDING_MODEL_NAME}"
    embedding_base_url: "${EMBEDDING_BASE_URL}"
    embedding_api_key: "${EMBEDDING_API_KEY}"

execution:
  max_workers: 10
  ingest_workers: 5
  max_queries: null

paths:
  raw_data: "Data/clapnq-main"
  doc_output_dir: "Data/clapnq-main/lightrag_per_question/processed_docs"
  vector_store: "Data/clapnq-main/lightrag_per_question/store_index"
  output_dir: "Output/ClapNQ/lightrag_per_question/experiment_0001"
  log_file: "Output/ClapNQ/lightrag_per_question/experiment_0001/benchmark.log"

llm:
  model: "${LLM_MODEL}"
  temperature: 0
  base_url: "${LLM_BASE_URL}"
  api_key: "${LLM_API_KEY}"
