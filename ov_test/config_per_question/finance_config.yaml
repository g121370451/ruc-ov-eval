project_name: "RAG_Benchmark"

# ===========修改配置================
dataset_name: "FinanceBench"

adapter:
  module: "src.adapters.finance_bench_adapter"
  class_name: "FinanceBenchAdapter"

execution:
  max_workers: 10
  ingest_workers: 5
  retrieval_topk: 5
  max_queries: null
  skip_ingestion: true
# ==================================

paths:
  raw_data: "Data/{dataset_name}/data/financebench_open_source.jsonl"
  doc_output_dir: "Data/{dataset_name}/per_query/processed_docs"
  vector_store: "Data/{dataset_name}/per_query/viking_store_index"
  output_dir: "Output/{dataset_name}/per_question_experiment_1"
  log_file: "Output/{dataset_name}/per_question_experiment_1/benchmark.log"

llm:
  model: "doubao-seed-2-0-pro-260215"
  temperature: 0
  base_url: "https://ark.cn-beijing.volces.com/api/v3"
  api_key: "269f7ee6-212a-4f46-9472-978a55cdb625"
