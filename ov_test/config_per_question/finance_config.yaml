project_name: "RAG_Benchmark"

# ===========修改配置================
dataset_name: "FinanceBench"

adapter:
  module: "src.adapters.finance_bench_adapter"
  class_name: "FinanceBenchAdapter"

execution:
  max_workers: 10
  ingest_workers: 5
  retrieval_topk: 5
  max_queries: null
# ==================================

paths:
  raw_data: "Data/{dataset_name}/data/financebench_open_source.jsonl"
  doc_output_dir: "Data/{dataset_name}/openviking/processed_docs"
  vector_store: "Data/{dataset_name}/openviking/store_index"
  output_dir: "Output/{dataset_name}/openviking_per_question/experiment_0001"
  log_file: "Output/{dataset_name}/openviking_per_question/experiment_0001/benchmark.log"

llm:
  model: "${LLM_MODEL}"
  temperature: 0
  base_url: "${LLM_BASE_URL}"
  api_key: "${LLM_API_KEY}"
