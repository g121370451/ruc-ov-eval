project_name: "RAG_Benchmark"
dataset_name: "Locomo"

adapter:
  module: "src.adapters.locomo_adapter"
  class_name: "LocomoAdapter"

store:
  type: "sql_agent"
  sql_agent_config:
    llm_model: "${LLM_MODEL}"
    llm_base_url: "${LLM_BASE_URL}"
    llm_api_key_env: "LLM_API_KEY"
    chunk_size: 800
    chunk_overlap: 100
    max_iterations: 15
    verbose: false

execution:
  max_workers: 5
  ingest_workers: 4
  retrieval_topk: 5
  max_queries: 50
  explain_not_mentioned: true
  
paths:
  raw_data: "Data/{dataset_name}/{dataset_name}.json"
  doc_output_dir: "Data/{dataset_name}/sql_agent/processed_docs"
  vector_store: "Data/{dataset_name}/sql_agent/store_index"
  output_dir: "Output/{dataset_name}/sql_agent_global/experiment_0001"
  log_file: "Output/{dataset_name}/sql_agent_global/experiment_0001/benchmark.log"

llm:
  model: "${LLM_MODEL}"
  temperature: 0
  base_url: "${LLM_BASE_URL}"
  api_key: "${LLM_API_KEY}"
