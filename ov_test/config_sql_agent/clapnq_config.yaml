project_name: "RAG_Benchmark"
dataset_name: "ClapNQ"

adapter:
  module: "src.adapters.clapnq_adapter"
  class_name: "ClapNQAdapter"

store:
  type: "sql_agent"
  sql_agent_config:
    llm_model: "${LLM_MODEL}"
    llm_base_url: "${LLM_BASE_URL}"
    llm_api_key_env: "LLM_API_KEY"
    chunk_size: 800
    chunk_overlap: 100
    sentence_aware_chunk: true
    chunk_min_size: 200
    chunk_max_size: 800
    max_iterations: 15
    verbose: false

execution:
  max_workers: 5
  ingest_workers: 4
  retrieval_topk: 5
  max_queries: null
  explain_not_mentioned: true

paths:
  raw_data: "Data/clapnq-main"
  doc_output_dir: "Data/clapnq-main/sql_agent/processed_docs"
  vector_store: "Data/clapnq-main/sql_agent/store_index"
  output_dir: "Output/ClapNQ/sql_agent_global/experiment_0001"
  log_file: "Output/ClapNQ/sql_agent_global/experiment_0001/benchmark.log"

llm:
  model: "${LLM_MODEL}"
  temperature: 0
  base_url: "${LLM_BASE_URL}"
  api_key: "${LLM_API_KEY}"
