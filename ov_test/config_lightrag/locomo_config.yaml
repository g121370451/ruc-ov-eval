project_name: "RAG_Benchmark"

dataset_name: "Locomo"

adapter:
  module: "src.adapters.locomo_adapter"
  class_name: "LocomoAdapter"

store:
  type: "lightrag"
  lightrag_config:
    llm_model: "${LLM_MODEL}"
    llm_base_url: "${LLM_BASE_URL}"
    llm_api_key_env: "LLM_API_KEY"
    embedding_model_name: "${EMBEDDING_MODEL_NAME}"
    embedding_base_url: "${EMBEDDING_BASE_URL}"
    embedding_api_key: "${EMBEDDING_API_KEY}"

execution:
  max_workers: 5
  ingest_workers: 3
  retrieval_topk: 5
  max_queries: null

paths:
  raw_data: "Data/{dataset_name}/{dataset_name}.json"
  doc_output_dir: "Data/{dataset_name}/lightrag_global/processed_docs"
  vector_store: "Data/{dataset_name}/lightrag_global/store_index"
  output_dir: "Output/{dataset_name}/lightrag_global/experiment_0001"
  log_file: "Output/{dataset_name}/lightrag_global/experiment_0001/benchmark.log"

llm:
  model: "${LLM_MODEL}"
  temperature: 0
  base_url: "${LLM_BASE_URL}"
  api_key: "${LLM_API_KEY}"
